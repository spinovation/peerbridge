# apphosting.yaml
# App Hosting configuration file for Next.js SSR

headers:
  - glob: "**/*.@(js|css|png|jpg|jpeg|gif|svg|ico|webmanifest)"
    headers:
      - key: Cache-Control
        value: public, max-age=604800, immutable

# Secrets are securely injected from Google Cloud Secret Manager at build/runtime
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyAHPNAnjVkRN72_YT70Sjgz0RBjR2n9eNU
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: peerbridge-910b7.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: peerbridge-910b7
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: peerbridge-910b7.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "685059324128"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:685059324128:web:8b05e7b84f9cbc259df885
  - variable: GEMINI_API_KEY
    secret: gemini_api_key_secret
  - variable: RESEND_API_KEY
    secret: resend_api_key_secret


